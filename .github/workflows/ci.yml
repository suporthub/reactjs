name: ci

on:
  push:
    branches: [main, develop]

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy securely over SSH (Direct Build)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /v3/reactjs
            
            # Force server to match GitHub exactly, bypassing any local modifications
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # Build the Vite React app + NGINX container natively (no cache to ensure updates)
            docker build --no-cache -t reactjs:latest .
            
            # Import image to local k3s registry
            docker save reactjs:latest | sudo k3s ctr images import -
            
            # Restart the deployment to serve the newly built web app
            kubectl rollout restart deployment/reactjs -n default
