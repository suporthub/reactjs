name: ci

on:
  push:
    branches: [main, develop]

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy securely over SSH (Direct Build)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /v3/reactjs
            
            # Force server to match GitHub exactly, bypassing any local modifications
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # Get short SHA for precise tagging
            export SHA=$(git rev-parse --short HEAD)

            # Build the Vite React app + NGINX container natively (no cache to ensure updates)
            docker build --no-cache -t reactjs:${SHA} .
            
            # Import image to local k3s registry
            docker save reactjs:${SHA} | sudo k3s ctr images import -
            
            # Update the deployment to use the new precise image tag
            kubectl set image deployment/reactjs reactjs=reactjs:${SHA} -n default
